name: scribe

on:
  schedule:
    # Weekly — refresh the wiki narrative as the garden grows.
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Scribe agent
        run: node agents/scribe.mjs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # PAT used for `gh repo view` and to clone/push the wiki repo.
          GH_TOKEN: ${{ secrets.AGENT_PAT }}

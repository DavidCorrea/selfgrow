name: product-owner

on:
  schedule:
    # Weekly — the vision is a slow-moving north star, not a daily edit.
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refine-vision:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # The PO edits the Vision in the wiki (a separate repo), not main — so no
      # main write and no shared writer lock are needed.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Product Owner agent
        run: node agents/product-owner.mjs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # PAT carries `project` scope (for board cards) and covers issue creation.
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          GH_PROJECT_OWNER: DavidCorrea
          GH_PROJECT_NUMBER: '3'

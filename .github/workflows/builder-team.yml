name: builder-team

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  # Kicked off after the Product Manager finishes grooming/prioritizing the backlog.
  # (Builder is deliberately NOT triggered by issue events.)
  workflow_run:
    workflows: ["product-manager"]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write

# Serialize every workflow that writes to main (builder-team + product-owner)
# so concurrent runs never race on branches or the push to main.
concurrency:
  group: agent-main-writer
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # When kicked by the PM, only run if the PM actually completed successfully
    # (skip the guarded-off agent-issue runs).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Full history is required for fetch/merge/rebase against origin/main.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (runtime verify)
        run: npx playwright install --with-deps chromium

      - name: Fetch open issues
        run: gh issue list --state open --json number,title,body,labels,createdAt --limit 20 > "$RUNNER_TEMP/open-issues.json"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Builder Team agents
        run: node agents/builder-team.mjs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # AGENT_PAT (= the user) is the default token: Projects, issues, and
          # approving/merging the PR. BOT_TOKEN (= github-actions[bot]) opens the
          # PR as a DIFFERENT identity, so the PAT can legitimately approve it.
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          BOT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PROJECT_OWNER: '@me'
          GH_PROJECT_NUMBER: '3'
          OPEN_ISSUES_PATH: ${{ runner.temp }}/open-issues.json

name: seed-wiki

# One-time migration, run manually: copies docs/VISION.md + docs/CHANGELOG.md
# into the wiki (their new canonical home). Run after the wiki is initialized.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed wiki from docs
        run: node agents/seed-wiki.mjs
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}

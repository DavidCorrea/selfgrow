name: product-manager

on:
  schedule:
    # Daily — grooms the backlog toward the vision.
    - cron: '0 8 * * *'
  workflow_dispatch:
  issues:
    # Triage inbound issues. The job guard below skips the agent's own creations.
    types: [opened, reopened]
  # Re-groom right after the Product Owner evolves the vision.
  workflow_run:
    workflows: ["product-owner"]
    types: [completed]

permissions:
  contents: read
  issues: write

# Creating a batch of tickets fires one issues.opened event per ticket, each
# spinning up another product-manager run (guard-skipped, but it still completes
# and so still kicks builder-team via workflow_run). Collapse that burst into a
# single run. cancel-in-progress: false so a self-fired run never aborts an
# in-flight grooming run — the redundant pending runs just supersede each other.
concurrency:
  group: product-manager
  cancel-in-progress: false

jobs:
  groom-backlog:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run on cron/dispatch; on issues only when NOT the agent's own creation
    # (else the PM loops on itself); on a PO run only when it succeeded.
    if: >-
      ${{
        (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        || (github.event_name == 'issues' && !contains(github.event.issue.labels.*.name, 'agent'))
        || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Chromium is needed to screenshot the app for the visual check.
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (visual check)
        run: npx playwright install --with-deps chromium

      - name: Run Product Manager agent
        run: node agents/product-manager.mjs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Vision models for the appearance check (pi registry ids, image-capable),
          # tried in order on rate-limit/error since free VLMs share tight limits.
          # Comma-separated; swap as the free lineup rotates.
          VISION_MODEL: "openrouter/google/gemma-4-31b-it:free,openrouter/nvidia/nemotron-nano-12b-v2-vl:free,openrouter/google/gemma-4-26b-a4b-it:free"
          # PAT carries `project` scope (board) and covers issue creation.
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          GH_PROJECT_OWNER: '@me'
          GH_PROJECT_NUMBER: '3'

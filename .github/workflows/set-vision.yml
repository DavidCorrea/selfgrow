name: set-vision

# One-time, run manually: resets the wiki Vision page to a clean, durable north
# star (replacing the old feature-tracker content). Safe to delete after running.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  set-vision:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reset the wiki Vision
        run: node agents/set-vision.mjs
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}

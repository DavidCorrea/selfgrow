<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SelfGrow Garden</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="pause.css" />
</head>
<body>
  <button id="pauseBtn" aria-label="Pause & Breathe" class="pause-button">Pause</button>
  <div id="pauseOverlay" class="pause-overlay" hidden>
    <div class="breathing-circle"></div>
    <audio id="breathAudio" src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAIlYAAB9AAACABAAZGF0YQAAAAA=" loop></audio>
  </div>
  <div id="garden" class="garden">
  <!-- Light overlay for sunrise/sunset -->
  <div id="lightOverlay" class="light-overlay"></div>
</div>
  <script type="module" src="reducedMotion.js"></script>
<script type="module" src="season.js"></script>
  <script type="module" src="garden.js"></script>
  <script type="module" src="weather.js"></script>
  <script type="module" src="creatures.js"></script>
  <script type="module" src="app.js"></script>
  <script type="module" src="pause.js"></script>
  <div id="settings" style="position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.8); padding: 5px; border-radius: 4px; z-index: 30;">
    <label>
      <input type="checkbox" id="seasonToggle" checked /> Seasonal Mode
    </label>
    <label style="margin-left:5px;">
      <input type="checkbox" id="reducedMotionToggle" /> Reduced Motion
    </label>
    <label style="margin-left:5px;">
      <input type="checkbox" id="ambientSoundToggle" checked /> Ambient Sound
    </label>
    <button id="journalToggle" aria-label="Journal" style="margin-left:5px;">Journal</button>
</div>
  <script type="module" src="settings.js"></script>
  <script type="module" src="ambientSound.js"></script>
  <script type="module" src="journal.js"></script>
</body>
</html>

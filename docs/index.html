<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Selfgrow Garden</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="toast.css" />
</head>
<body>
  <div id="garden"></div>
  <div id="lightOverlay" style="position:absolute;inset:0;pointer-events:none;z-index:10;"></div>
  <div id="moth-container" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>
  <div class="controls" style="display:flex;gap:0.5rem;flex-wrap:wrap;">
    <button id="toggle-flora" aria-pressed="true">Disable Flora</button>
    <button id="toggle-seasonal" aria-pressed="false">Show seasonal only</button>
    <button id="journalToggle" aria-expanded="false" aria-controls="journalPanel">Journal</button>
    <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.9rem;">
      <input type="checkbox" id="reducedMotionToggle" aria-label="Reduce motion" /> Reduce motion
    </label>
    <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.9rem;">
      <input type="checkbox" id="ambientSoundToggle" aria-label="Ambient sound" /> Ambient sound
    </label>
    <button id="saveSettingsBtn" style="margin-left:0.5rem;">Save Settings</button>
  </div>
  <script src="reducedMotion.js"></script>
  <script type="module" src="season.js"></script>
  <script type="module" src="journal.js"></script>
  <script type="module" src="flora.js"></script>
  <script src="wind.js"></script>
  <script type="module" src="seasonal-toggle.js"></script>
  <script src="mothAgent.js"></script>
  <script src="ambientSound.js"></script>
  <script src="fireflyAgent.js"></script>
  <script type="module" src="settings.js"></script>
</body>
</html>

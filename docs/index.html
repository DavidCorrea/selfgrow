<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selfgrow Garden</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Ensure the garden container fills the page */
    #garden {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="garden"></div>

  <script>
    // Simple sunset detection based on local hour (18:00‑19:00 considered sunset window)
    const now = new Date();
    const hour = now.getHours();
    const minute = now.getMinutes();
    // If time is between 18:00 and 19:05 start the transition
    if (hour === 18 || (hour === 19 && minute <= 5)) {
      document.body.setAttribute('data-sunset', '');
    }
  </script>
</body>
</html>

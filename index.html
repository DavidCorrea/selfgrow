<!DOCTYPE html>

<head>

  <title>selfgrow</title>

    <div class="card" id="welcomeCard">
      <h1 class="title">selfgrow</h1>
      <p class="tagline">a living, growing digital garden</p>

        <div class="soil"></div>
        <div class="seed" id="seed"></div>
        <div class="sprout" id="sprout">
          <div class="stem"></div>
          <div class="leaf leaf--left"></div>
          <div class="leaf leaf--right"></div>
          <div class="flower">
            <div class="petal petal--1"></div>
            <div class="petal petal--2"></div>
            <div class="petal petal--3"></div>
            <div class="petal petal--4"></div>
            <div class="petal petal--5"></div>
            <div class="petal petal--6"></div>
            <div class="center"></div>
          </div>
        </div>
      </div>
      <p class="hint" id="hint">click the soil to plant a seed</p>
      <p class="message" id="message"></p>
    </div>

    <!-- Garden Visitors Layer -->
    <div class="visitors-layer" id="visitorsLayer" aria-hidden="true"></div>

    <!-- Tending Toolbar -->
    <div class="tending-toolbar" id="tendingToolbar" aria-hidden="true">
      <p class="tending-hint" id="tendingHint"></p>
      <div class="tending-tools">
        <button class="tool-btn" id="wateringCanBtn" aria-label="Watering can" title="Water your plants">
          <span class="tool-icon">🚿</span>
          <span class="tool-label">water</span>
        </button>
      </div>
    </div>

    <!-- Garden Journal -->
    <div class="garden-journal" id="gardenJournal" aria-hidden="true">
      <div class="journal-header">
        <span class="journal-icon">🌿</span>
        <h2 class="journal-title">your garden's story</h2>
        <span class="journal-last-tended" id="journalLastTended" aria-label="Last tended timestamp"></span>
      </div>
      <div class="journal-timeline" id="journalTimeline" role="log" aria-label="Garden journal entries">
        <p class="journal-empty" id="journalEmpty">your journal awaits its first entry...</p>
      </div>
